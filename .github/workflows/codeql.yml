name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  analyze:
    name: Analyze (Swift)
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swift 6.0
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Install dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install vips imagemagick pkg-config

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift

      - name: Build
        run: swift build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
